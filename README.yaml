## 🎯 CLIP Embedding System

Gate matching uses **CLIP (ViT-B-32)** embeddings — 512-dimensional normalized vectors where cosine similarity (dot product) measures visual similarity.

**What gets embedded:**
The frame taken **4 frames before the pass fires**, cropped to the gate bounding box + 50% padding. Using the full gate + surroundings (not just the gate itself) is intentional: all gates of the same shape look identical front-on, but their surrounding environment (trees, sky, ground, other structures) is what makes each gate visually unique.

**GateDB matching (race mode):**
Each gate slot stores up to **6 embeddings** (from different laps or videos). On each detected pass, the query embedding is compared against all clips in each gate in the lookahead window (default: 3 gates ahead). A pass is counted as RACE if:
1. Best clip similarity ≥ `sim_thresh` (default 0.88)
2. Best gate score beats second-best gate by ≥ `min_match_margin` (default 0.03)

Both thresholds are adjustable in `race_ui.py` and `debug_ui_defaults.json`.

---

## 🏷️ Flagpole Pass Detection

Flagpoles use different logic because you fly *past* them rather than *through* them.

**Algorithm:**
1. While visible: check whether the flag was ever near horizontal frame center (nx within `flag_center_tol` of 0.5) with sufficient area. This confirms the pole was actually in front of the drone.
2. On disappearance: if the flag was centered AND disappeared within `disappear_timeout` seconds AND at least `flag_min_edges` bounding-box edges were close to real frame edges → **PASS** (reason: `flag_disappear_edge`).

**Black bar handling (4:3 camera in 16:9 video):**
At startup, `detect_camera_edges()` scans the first frame to find where real content begins and ends. "Near the edge" is measured against the actual camera boundary, not the video container edge.

