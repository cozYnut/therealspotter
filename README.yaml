## 🖊️ Dataset Tools

```bash
# Generate YOLO dataset from videos (auto pseudo-label)
python fpv_pseudo_label.py \
  --video_dir ./videos \
  --out_dir ./dataset \
  --yolo_model current_best_non_vocab.pt \
  --conf 0.25 --maxdet 50 --min_area_ratio 0.002

