## 🏗️ learn_ui.py — Gate Learning UI

Two-phase workflow. Phase 1 runs headlessly to extract pass candidates; Phase 2 is an interactive UI where you assign candidates to gate slots and build the track memory.

### Phase 1 — extract_candidates.py

Runs YOLO + TimeTracker + PassDetector + CLIP on the video without any display.
Saves every detected gate-pass candidate (embedding + cropped image) to JSON.
Run once per video; reuse the JSON as many times as needed in Phase 2.

```bash
python extract_candidates.py \
  --video ~/races/video1.mp4 \
  --det-model current_best_non_vocab.pt \
  --output candidates.json \
  --crops-dir candidate_crops \
  --clip-device mps
```

Output:
- `candidates.json`   — detected pass events with CLIP embeddings + bbox
- `candidate_crops/`  — gate crop image for each candidate

**How the crop is taken:**
The embedding and saved image use the frame **4 frames before the pass fires**, cropped to the gate's bounding box with 50% padding on each side. This captures the gate + surrounding environment at the moment of approach, which is what distinguishes one gate from another visually.

Key flags:
```
--clip-device     cpu / mps / cuda  (mps recommended on Apple Silicon)
--det-conf        YOLO confidence threshold (default 0.25)
```

---

### Phase 2 — learn_ui.py

Interactive PyQt6 UI. No command-line arguments needed — open everything from inside the UI.

```bash
python learn_ui.py
```

**UI layout:**
- Left  — video player + seekable timeline + action buttons
- Right — gate order list + matched crop preview

**Timeline legend:**
- Coloured thin ticks  = pass candidates detected in Phase 1 (blue=square, cyan=arch, green=circle, magenta=flagpole)
- Coloured diamond     = user-placed gate marker
- Red playhead line    = current position

**Keyboard shortcuts:**
```
Space            Play / Pause
Up / Down        Seek ±1 frame
Left / Right     Seek ±1 second
Shift+Left/Right Seek ±10 seconds
G                Mark gate pass (auto-detect type from nearest candidate)
1 / 2 / 3 / 4   Mark gate pass with explicit type (square/arch/circle/flagpole)
L                Mark Start/Finish gate (G1) — see below
D                Delete last marker  (DEFINE mode only)
S                Save gate_memory.json
```

**Toolbar:**
- `Match ±` spinner — search window in frames (default 120f). G picks the nearest unused candidate within this window.
- MODE badge — shows current mode and next expected gate.

---

### Workflow — Single Video (multiple laps)

The **Start/Finish** button (L key) marks the Start/Finish gate, which is always **G1**. It also resets the gate queue so the next G press targets G2.

```
1. Seek to the Start/Finish gate crossing
2. Press L  →  creates G1 (Start/Finish), status: "press G for G2, G3…"
3. Seek to each subsequent gate
4. Press G  →  creates G2, G3, G4… in sequence
5. When you cross Start/Finish again at the end of the lap:
   Press L  →  adds a 2nd embedding to G1, resets queue to G2
              MODE badge changes to "DEFINE (Lap 2)  Next: G2"
6. Press G for each gate again (lap 2) — adds 2nd embeddings to G2, G3, G4…
7. Repeat for more laps (up to 6 embeddings per gate)
8. Press S  →  save gate_memory.json
```

The gate list shows embedding progress:
```
▶ G1  square   [3/6]   ← ▶ = next in queue; 3 embeddings so far
  G2  flagpole [2/6]
  ⚠ G3  arch   [0/6]   ← ⚠ = no candidate found, won't match in race
  G4  square   [4/6]
```

---

### Workflow — Multiple Videos (ADD mode)

Open each additional video from inside the UI. Because gate slots already exist, it enters ADD mode automatically (L and D are disabled; G cycles through existing slots G1→G2→…→GN→G1).

```
Video 1 (DEFINE mode):
  1. Open Video → load video 1  (extraction runs automatically in background)
  2. Press L for Start/Finish, then G for each gate, L at end of each lap
  → Defines the track structure AND stores first embeddings

Video 2+ (ADD mode):
  3. Open Video → load video 2 → confirm ADD mode prompt
     (extraction runs automatically for video 2)
  4. Press G for each gate in the same order
  → Embeddings are added to existing slots (up to 6 per gate)

Save:
  5. Press S → gate_memory.json written with all embeddings from all videos
```

