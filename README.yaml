## 🏁 race_ui.py — Race Review UI

Reviews a race video against a learned track. Runs extraction in the background and shows a timeline with pass markers, lap list, and a Match Candidates panel.

```bash
python race_ui.py
```

No command-line arguments. Open everything from inside the UI.

**Workflow:**
1. `📂 Open Video`        — select race video
2. `🧠 Open Gate Memory`  — select gate_memory.json
3. Adjust **Sim ≥** and **Margin ≥** spinboxes if needed (see below)
4. `▶ Run Race Analysis`  — extraction runs in background, results load automatically
5. Scrub the timeline to review gate passes, lap splits, and match candidates

**Toolbar controls:**
```
Sim ≥       Minimum cosine similarity for a gate to count as MATCH (default 0.88)
Margin ≥    Minimum gap between best and second-best gate similarity (default 0.03)
```
Both defaults are loaded from `debug_ui_defaults.json` at startup. Edit that file to change the persistent defaults.

**Timeline legend:**
```
Green tick   = gate pass matched (RACE)
Red tick     = gate detected, no match (NOMATCH)
Orange tick  = duplicate gate within a lap (DUP)
Yellow line  = lap boundary
Red line     = playhead
```

**Keyboard shortcuts:**
```
Space            Play / Pause
Up / Down        Seek ±1 frame
Left / Right     Seek ±1 second
Shift+Left/Right Seek ±10 seconds
```

**Right panel:**
- **Laps** — list of completed laps; click a lap to jump to its start and see gate-by-gate splits
- **Frame Info** — tracks, pass events, and lap markers at the current frame
- **Match Candidates** — thumbnail strip showing the query frame (what the drone saw 4 frames before the pass) alongside the stored reference clips for each gate in the comparison window. Green border = matched gate, blue = no-match, gray = other candidates in window.

**⊞ Detail popup:**
Click the ⊞ button next to "Match Candidates" to open a **resizable standalone window** with full-size images. Images preserve aspect ratio. Each reference clip shows its **cosine similarity percentage** to the query frame (e.g. `87.4%`). The matched gate header shows `best 92.1% MATCH`; unmatched gates show their best score so you can see how close they came.

> Requires re-running race analysis after changing Sim/Margin values or after updating gate_memory.json.

