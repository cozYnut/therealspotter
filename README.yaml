## 🔧 debug_ui.py — Pass Detector Tuning UI

Standalone tool for tuning PassDetector parameters. Load a video, mark your observed gate passes as ground truth, then run the detector and compare on the timeline.

```bash
python debug_ui.py
```

**Workflow:**
1. `📂 Open Video`   — select video
2. `🔧 Set Model`    — select YOLO .pt model
3. Scrub to each gate pass → press **P** to place a ground-truth mark
4. Adjust parameters in the right panel
5. `▶ Run Detector`  — runs pass detection in background, results appear on timeline
6. Compare detected passes (coloured ticks) against your ground-truth marks (green lines)
7. `💾 Save Defaults` — writes current parameters to `debug_ui_defaults.json`

**Keyboard shortcuts:**
```
Space            Play / Pause
Up / Down        Seek ±1 frame
Left / Right     Seek ±1 second
Shift+Left/Right Seek ±10 seconds
P                Place ground-truth pass mark
D                Delete last ground-truth mark
R                Run pass detector with current parameters
```

**Parameter panel:**
All PassDetector parameters are loaded automatically from the class signature — adding a new parameter to PassDetector makes it appear in the UI immediately. Parameters are grouped into **Gates** and **Flags** tabs. The most impactful ones:

```
Gates:
  disappear_timeout         How long after a gate disappears before a pass fires (seconds)
  pass_cooldown_sec         Minimum time between consecutive passes on the same gate
  aligned_max_age_sec       Max time a gate stays in "aligned" state (seconds)
  aligned_shrink_reset_frac Sensitivity to a gate moving away while aligned
  gate_pass_area_thresh     Area peak threshold for in-frame pass detection
  min_aligned_frames        Minimum consecutive frames to enter aligned state

Flags (flagpoles):
  flag_center_tol           How close to frame center the pole must be (fraction)
  flag_edge_tol             How close to real frame edge on disappear (fraction)
  flag_min_edges            How many bbox edges must be near the frame edge
  disappear_timeout         Shared with gate disappear logic
```

**Timeline legend:**
```
Green tall line   = user ground-truth mark
Coloured ticks    = detected passes (colour = gate type)
Orange ticks      = "aligned" state events
Red line          = playhead
```

**Saving defaults:**
`💾 Save Defaults` writes to `debug_ui_defaults.json`. This file is also read by `race_ui.py` at startup to set the Sim and Margin spinbox defaults.

